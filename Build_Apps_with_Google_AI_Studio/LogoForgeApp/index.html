<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LogoForge</title>
    <meta name="description" content="Generate SVG logo concepts with Gemini — fast prototypes for brand identity." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root{
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #e2e8f0;
        --primary: #4f46e5;
        --shadow: 0 10px 30px rgba(2,6,23,.08);
        --radius: 16px;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans TC", Arial, sans-serif;
        line-height: 1.5;
      }

      /* Centered container */
      #root {
        max-width: 1200px;
        margin: 0 auto;
        padding: 28px 20px 48px;
      }

      /* Global typography (helps when Tailwind isn't applied) */
      h1, h2, h3 { margin: 0 0 12px; line-height: 1.2; }
      h1 { font-size: 44px; letter-spacing: -0.02em; }
      p { margin: 0 0 12px; color: var(--muted); }

      /* Make form fields look consistent */
      label {
        display: block;
        font-weight: 600;
        font-size: 12px;
        color: var(--muted);
        margin: 10px 0 6px;
      }

      input, select, textarea {
        width: 100%;
        max-width: 520px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--card);
        color: var(--text);
        outline: none;
        box-shadow: 0 1px 0 rgba(2,6,23,.03);
      }
      input:focus, select:focus, textarea:focus {
        border-color: rgba(79,70,229,.55);
        box-shadow: 0 0 0 4px rgba(79,70,229,.12);
      }

      button {
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        font-weight: 700;
        cursor: pointer;
        transition: transform .06s ease, box-shadow .2s ease, background .2s ease;
      }
      button:hover {
        background: #f1f5f9;
        box-shadow: 0 8px 18px rgba(2,6,23,.06);
      }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: .55; cursor: not-allowed; }

      /* A subtle "card" helper class you can use later if needed */
      ._card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
